<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("/static/images/fon.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .title {
            text-align: left;
            font-size: 40px;
            font-weight: bold;
            margin: 50px 0 0 50px;
        }

        .title .red {
            color: #E4002B;
        }

        .title .black {
            color: #000000;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 100px;
        }

        .button-container a {
            text-decoration: none;
            margin: 10px 0;
        }

        .btn {
            background-color: #e4002b;
            color: #ffffff;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            width: 400px;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #cc0025;
        }
    </style>
</head>
<body>
<div>
    <div class="title">
        <span class="red">КАЛЬКУЛЯТОР <br>СТОИМОСТИ</span> <span class="black">ПРОЕКТА</span>
    </div>
    <div class="button-container">
        <a href="/user/panel">
            <button class="btn">РАССЧИТАТЬ</button>
        </a>
        <a href="/user/login">
            <button class="btn">ПАНЕЛЬ АДМИНИСТРАТОРА</button>
        </a>
    </div>
</div>
</body>
</html>
